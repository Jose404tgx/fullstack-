<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes - CRUD</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { background: #f5f5f5; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { text-align: center; color: #333; margin-bottom: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .form-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
        .form-group { flex: 1; min-width: 150px; }
        label { display: block; margin-bottom: 5px; color: #555; font-weight: bold; font-size: 14px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        input:focus { outline: none; border-color: #007bff; }
        .btn-group { display: flex; gap: 10px; }
        button { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .btn-primary { background: #007bff; color: white; }
        .btn-primary:hover { background: #0056b3; }
        .btn-success { background: #28a745; color: white; }
        .btn-success:hover { background: #1e7e34; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-danger:hover { background: #c82333; }
        .btn-warning { background: #ffc107; color: #333; }
        .btn-warning:hover { background: #e0a800; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #007bff; color: white; }
        tr:hover { background: #f8f9fa; }
        .acciones { display: flex; gap: 5px; }
        .acciones button { padding: 6px 12px; font-size: 12px; }
        #mensaje { padding: 10px; border-radius: 4px; margin-bottom: 15px; display: none; }
        .mensaje-exito { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .mensaje-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gestión de Clientes</h1>
        
        <div id="mensaje"></div>

        <div class="card">
            <h2 style="margin-bottom: 15px; color: #333;">Formulario de Cliente</h2>
            <input type="hidden" id="id_cliente">
            <div class="form-row">
                <div class="form-group">
                    <label for="nombres">Nombres</label>
                    <input type="text" id="nombres" placeholder="Ingrese nombres">
                </div>
                <div class="form-group">
                    <label for="apellidos">Apellidos</label>
                    <input type="text" id="apellidos" placeholder="Ingrese apellidos">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="direccion">Dirección</label>
                    <input type="text" id="direccion" placeholder="Ingrese dirección">
                </div>
                <div class="form-group">
                    <label for="telefono">Teléfono</label>
                    <input type="text" id="telefono" placeholder="Ingrese teléfono">
                </div>
            </div>
            <div class="btn-group" style="margin-top: 10px;">
                <button class="btn-primary" onclick="guardarCliente()">Guardar</button>
                <button class="btn-warning" onclick="limpiarFormulario()">Limpiar</button>
            </div>
        </div>

        <div class="card">
            <h2 style="margin-bottom: 15px; color: #333;">Lista de Clientes</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombres</th>
                        <th>Apellidos</th>
                        <th>Dirección</th>
                        <th>Teléfono</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaClientes"></tbody>
            </table>
        </div>
    </div>

    <script>
        let clientes = [];

        async function cargarClientes() {
            try {
                const response = await fetch('/clientes');
                clientes = await response.json();
                renderizarTabla();
            } catch (error) {
                mostrarMensaje('Error al cargar clientes', 'error');
            }
        }

        function renderizarTabla() {
            const tbody = document.getElementById('tablaClientes');
            tbody.innerHTML = clientes.map(c => `
                <tr>
                    <td>${c.id_cliente}</td>
                    <td>${c.nombres}</td>
                    <td>${c.apellidos}</td>
                    <td>${c.direccion}</td>
                    <td>${c.telefono}</td>
                    <td class="acciones">
                        <button class="btn-warning" onclick="editarCliente(${c.id_cliente})">Editar</button>
                        <button class="btn-danger" onclick="eliminarCliente(${c.id_cliente})">Eliminar</button>
                    </td>
                </tr>
            `).join('');
        }

        async function guardarCliente() {
            const id_cliente = document.getElementById('id_cliente').value;
            const data = {
                nombres: document.getElementById('nombres').value,
                apellidos: document.getElementById('apellidos').value,
                direccion: document.getElementById('direccion').value,
                telefono: document.getElementById('telefono').value
            };

            if (!data.nombres || !data.apellidos || !data.direccion || !data.telefono) {
                mostrarMensaje('Todos los campos son obligatorios', 'error');
                return;
            }

            try {
                const method = id_cliente ? 'PUT' : 'POST';
                const url = id_cliente ? `/clientes/${id_cliente}` : '/clientes';
                
                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    mostrarMensaje(id_cliente ? 'Cliente actualizado' : 'Cliente guardado', 'exito');
                    limpiarFormulario();
                    cargarClientes();
                } else {
                    const errData = await response.json();
                    mostrarMensaje('Error: ' + (errData.error || errData.message || 'Error al guardar'), 'error');
                }
            } catch (error) {
                mostrarMensaje('Error al guardar', 'error');
            }
        }

        function editarCliente(id) {
            const cliente = clientes.find(c => c.id_cliente === id);
            if (cliente) {
                document.getElementById('id_cliente').value = cliente.id_cliente;
                document.getElementById('nombres').value = cliente.nombres;
                document.getElementById('apellidos').value = cliente.apellidos;
                document.getElementById('direccion').value = cliente.direccion;
                document.getElementById('telefono').value = cliente.telefono;
            }
        }

        async function eliminarCliente(id) {
            if (!confirm('¿Está seguro de eliminar este cliente?')) return;

            try {
                const response = await fetch(`/clientes/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    mostrarMensaje('Cliente eliminado', 'exito');
                    cargarClientes();
                } else {
                    mostrarMensaje('Error al eliminar', 'error');
                }
            } catch (error) {
                mostrarMensaje('Error al eliminar', 'error');
            }
        }

        function limpiarFormulario() {
            document.getElementById('id_cliente').value = '';
            document.getElementById('nombres').value = '';
            document.getElementById('apellidos').value = '';
            document.getElementById('direccion').value = '';
            document.getElementById('telefono').value = '';
        }

        function mostrarMensaje(texto, tipo) {
            const mensaje = document.getElementById('mensaje');
            mensaje.textContent = texto;
            mensaje.className = tipo === 'exito' ? 'mensaje-exito' : 'mensaje-error';
            mensaje.style.display = 'block';
            setTimeout(() => mensaje.style.display = 'none', 3000);
        }

        cargarClientes();
    </script>
</body>
</html>
